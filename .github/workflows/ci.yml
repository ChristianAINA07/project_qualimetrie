name: CI Quality Pipeline

on:
  push:
    branches: ["main", "feature/**", "refactor/**"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # requis par SonarCloud pour le blame

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run Linter (ESLint)
        run: npm run lint

      - name: Run Tests with Coverage
        run: npm test

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=ChristianAINA07_project_qualimetrie
            -Dsonar.organization=christianaina07
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}